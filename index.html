<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>S2 — تسجيل الدخول</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #080c10;
            --surface:   #0d1117;
            --surface2:  #111820;
            --border:    #1e2733;
            --border2:   #263040;
            --accent:    #4f8ef7;
            --accent-dim:#1a2d4d;
            --green:     #2ea84f;
            --green-dim: #0d2b18;
            --text:      #dce6f0;
            --text2:     #8899aa;
            --text3:     #506070;
            --danger:    #e05a52;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-size: 15px;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ══ SPLASH ══ */
        #splash {
            position: fixed; inset: 0; z-index: 9999;
            background: #080c10;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 32px;
        }
        .sp-logo {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            animation: spRise .7s cubic-bezier(.34,1.56,.64,1) forwards;
            opacity: 0; transform: translateY(20px) scale(.9);
        }
        @keyframes spRise { to { opacity:1; transform:translateY(0) scale(1); } }
        .sp-mark {
            width: 72px; height: 72px; border-radius: 18px;
            background: linear-gradient(145deg, #111a28, #0d1420);
            border: 1px solid #1e2d42;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: 900; color: #dce6f0; letter-spacing: -2px;
            box-shadow: 0 0 40px rgba(79,142,247,.12), inset 0 1px 0 rgba(255,255,255,.05);
        }
        .sp-mark span { color: #4f8ef7; }
        .sp-name { font-size: .75rem; font-weight: 700; color: #506070; letter-spacing: 3px; text-transform: uppercase; }
        .sp-track { width: 140px; animation: fadeIn .4s .5s ease forwards; opacity: 0; }
        @keyframes fadeIn { to { opacity:1; } }
        .sp-rail { height: 2px; background: #1e2733; border-radius: 2px; overflow: hidden; }
        .sp-fill {
            height: 100%; width: 0;
            background: linear-gradient(90deg, #4f8ef7, #2ea84f);
            border-radius: 2px; transition: width .4s ease;
            box-shadow: 0 0 10px rgba(79,142,247,.4);
        }
        .sp-hint { font-size: 11px; color: #506070; letter-spacing: 1px; text-align: center; margin-top: 8px; }
        #splash.out { animation: spOut .4s ease forwards; pointer-events: none; }
        @keyframes spOut { to { opacity:0; } }

        /* ══ AUTH ══ */
        #auth {
            display: none; min-height: 100vh;
            align-items: center; justify-content: center;
            padding: 24px;
        }
        #auth.show { display: flex; animation: authIn .35s ease; }
        @keyframes authIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        .auth-wrap {
            width: 100%; max-width: 400px;
            display: flex; flex-direction: column; align-items: center; gap: 28px;
        }
        .auth-brand { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .auth-mark {
            width: 60px; height: 60px; border-radius: 15px;
            background: var(--surface2); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; font-weight: 900; color: var(--text); letter-spacing: -2px;
            box-shadow: 0 4px 20px rgba(0,0,0,.3);
        }
        .auth-mark span { color: var(--accent); }
        .auth-title { font-size: 1.1rem; font-weight: 700; color: var(--text); }
        .auth-sub   { font-size: 12px; color: var(--text3); letter-spacing: 1px; }
        .auth-card {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px; padding: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,.25);
        }
        .field-label {
            font-size: 11px; font-weight: 700; color: var(--text3);
            letter-spacing: 1.5px; text-transform: uppercase;
            margin-bottom: 6px; display: block;
        }
        .field-wrap { position: relative; margin-bottom: 16px; }
        .field-wrap i.fi {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            color: var(--text3); font-size: 13px; pointer-events: none;
        }
        .auth-input {
            width: 100%; padding: 11px 40px 11px 14px;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 8px; font-size: 14px;
            font-family: 'Tajawal', sans-serif; color: var(--text); outline: none;
            transition: border-color .2s, box-shadow .2s;
            -webkit-user-select: text; user-select: text;
        }
        .auth-input::placeholder { color: var(--text3); font-size: 13px; }
        .auth-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79,142,247,.1);
        }
        .pass-toggle {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text3);
            cursor: pointer; font-size: 13px; padding: 2px; transition: color .2s;
        }
        .pass-toggle:hover { color: var(--text2); }
        .auth-alert {
            font-size: 13px; font-weight: 500;
            padding: 10px 14px; border-radius: 8px;
            margin-bottom: 16px; display: none;
            border: 1px solid transparent; line-height: 1.5;
        }
        .auth-alert.info    { display:block; background:var(--accent-dim); color:var(--accent); border-color:rgba(79,142,247,.2); }
        .auth-alert.success { display:block; background:var(--green-dim); color:var(--green); border-color:rgba(46,168,79,.2); }
        .auth-alert.danger  { display:block; background:rgba(224,90,82,.08); color:var(--danger); border-color:rgba(224,90,82,.2); }
        .auth-btn {
            width: 100%; padding: 12px;
            background: var(--accent); color: #fff;
            border: none; border-radius: 8px;
            font-size: 15px; font-weight: 700; font-family: 'Tajawal', sans-serif;
            cursor: pointer; transition: opacity .2s, transform .1s;
        }
        .auth-btn:hover:not(:disabled) { opacity: .9; }
        .auth-btn:active { transform: scale(.98); }
        .auth-btn:disabled { opacity: .5; cursor: not-allowed; }
        .spin {
            display: inline-block; width: 13px; height: 13px;
            border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
            border-radius: 50%; animation: spin .7s linear infinite;
            margin-left: 8px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .remember-row {
            display: flex; align-items: center; gap: 9px;
            margin-bottom: 16px; cursor: pointer;
        }
        .rem-box {
            width: 16px; height: 16px; border-radius: 4px;
            border: 1.5px solid var(--border2); background: var(--surface2);
            display: flex; align-items: center; justify-content: center;
            transition: .15s; flex-shrink: 0; font-size: 9px; color: #fff;
        }
        .rem-box.on { background: var(--accent); border-color: var(--accent); }
        .remember-row span { font-size: 12.5px; color: var(--text2); }
        .forgot-link {
            display: block; text-align: center; margin-top: 14px;
            font-size: 12px; color: var(--text3); text-decoration: none;
            transition: color .2s;
        }
        .forgot-link:hover { color: var(--accent); }
        .security-badge {
            display: flex; align-items: center; gap: 7px; justify-content: center;
            font-size: 11px; color: var(--text3); margin-top: 16px;
        }
        .security-badge i { color: var(--green); font-size: 12px; }

        /* ══ Reset Modal ══ */
        #resetModal {
            display: none; position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
            align-items: center; justify-content: center; padding: 24px;
        }
        #resetModal.show { display: flex; }
        .modal-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 24px; width: 100%; max-width: 360px;
            animation: authIn .25s ease;
        }
        .modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 6px; color: var(--text); }
        .modal-sub   { font-size: 12px; color: var(--text3); margin-bottom: 18px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
        .btn-cancel {
            flex:1; padding: 10px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--surface2); color: var(--text2); font-family: 'Tajawal', sans-serif;
            font-size: 14px; cursor: pointer;
        }
        .btn-send {
            flex:1; padding: 10px; border-radius: 8px; border: none;
            background: var(--accent); color: #fff; font-family: 'Tajawal', sans-serif;
            font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity .2s;
        }
        .btn-send:hover { opacity: .85; }
        .btn-send:disabled { opacity: .5; cursor: not-allowed; }
        .auth-footer { font-size: 11px; color: var(--text3); text-align: center; }
    </style>
</head>
<body oncontextmenu="return false;">

<!-- ══ Splash ══ -->
<div id="splash">
    <div class="sp-logo">
        <div class="sp-mark">S<span>2</span></div>
        <div class="sp-name">منصة تعليمية</div>
    </div>
    <div class="sp-track">
        <div class="sp-rail"><div class="sp-fill" id="spBar"></div></div>
        <div class="sp-hint" id="spHint">جاري التهيئة...</div>
    </div>
</div>

<!-- ══ Auth ══ -->
<div id="auth">
    <div class="auth-wrap">
        <div class="auth-brand">
            <div class="auth-mark">S<span>2</span></div>
            <div class="auth-title">منصة S2 التعليمية</div>
            <div class="auth-sub">تسجيل الدخول للمتابعة</div>
        </div>
        <div class="auth-card">
            <div id="authAlert" class="auth-alert"></div>

            <label class="field-label" for="loginEmail">البريد الإلكتروني</label>
            <div class="field-wrap">
                <i class="fi fas fa-envelope"></i>
                <input class="auth-input" type="email" id="loginEmail"
                    placeholder="example@mail.com" autocomplete="email">
            </div>

            <label class="field-label" for="loginPassword">كلمة المرور</label>
            <div class="field-wrap">
                <i class="fi fas fa-lock"></i>
                <input class="auth-input" type="password" id="loginPassword"
                    placeholder="••••••••" autocomplete="current-password">
                <button class="pass-toggle" id="passToggle" type="button" tabindex="-1">
                    <i class="fas fa-eye" id="passIcon"></i>
                </button>
            </div>

            <div class="remember-row" id="remRow">
                <div class="rem-box" id="remBox"></div>
                <span>تذكرني في هذا الجهاز</span>
            </div>

            <button class="auth-btn" id="loginBtn">تسجيل الدخول</button>

            <a href="#" class="forgot-link" id="forgotLink">نسيت كلمة المرور؟</a>

            <div class="security-badge">
                <i class="fas fa-shield-alt"></i>
                محمي بـ Firebase Authentication — بيانات مشفرة
            </div>
        </div>
        <div class="auth-footer">منصة S2 التعليمية — جميع الحقوق محفوظة</div>
    </div>
</div>

<!-- ══ Reset Modal ══ -->
<div id="resetModal">
    <div class="modal-card">
        <div class="modal-title">استعادة كلمة المرور</div>
        <div class="modal-sub">سنرسل رابط إعادة التعيين إلى بريدك الإلكتروني</div>
        <div id="resetAlert" class="auth-alert"></div>
        <label class="field-label" for="resetEmail">البريد الإلكتروني</label>
        <div class="field-wrap">
            <i class="fi fas fa-envelope"></i>
            <input class="auth-input" type="email" id="resetEmail" placeholder="example@mail.com">
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" id="cancelReset">إلغاء</button>
            <button class="btn-send" id="sendReset">إرسال الرابط</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
    getAuth,
    signInWithEmailAndPassword,
    sendPasswordResetEmail,
    setPersistence,
    browserLocalPersistence,
    browserSessionPersistence,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const FB_CONFIG = {
    apiKey:            "AIzaSyAhRvNdTyX_S29wfjBdxQ1QR98XmNB_6WQ",
    authDomain:        "wep-app-1771a.firebaseapp.com",
    projectId:         "wep-app-1771a",
    storageBucket:     "wep-app-1771a.firebasestorage.app",
    messagingSenderId: "568445406110",
    appId:             "1:568445406110:web:b2225d5747779e70a2248f"
};

const app  = initializeApp(FB_CONFIG);
const auth = getAuth(app);
const $    = id => document.getElementById(id);
const sleep = ms => new Promise(r => setTimeout(r, ms));

function translateError(code) {
    const map = {
        'auth/user-not-found':        'لم يُعثر على حساب بهذا البريد الإلكتروني.',
        'auth/wrong-password':        'كلمة المرور غير صحيحة.',
        'auth/invalid-email':         'صيغة البريد الإلكتروني غير صحيحة.',
        'auth/user-disabled':         'هذا الحساب موقوف. تواصل مع الدعم.',
        'auth/too-many-requests':     'محاولات كثيرة. انتظر قليلاً ثم حاول مجدداً.',
        'auth/network-request-failed':'خطأ في الاتصال بالإنترنت.',
        'auth/invalid-credential':    'البريد الإلكتروني أو كلمة المرور غير صحيحة.',
    };
    return map[code] || 'حدث خطأ. يرجى المحاولة لاحقاً.';
}

function showAlert(msg, type, id = 'authAlert') {
    const el = $(id);
    el.className = 'auth-alert ' + type;
    el.textContent = msg;
}
function clearAlert(id = 'authAlert') {
    const el = $(id);
    el.className = 'auth-alert';
    el.textContent = '';
}

let rem = !!localStorage.getItem('s2_rem');
const syncRem = () => $('remBox').classList.toggle('on', rem);
$('remRow').addEventListener('click', () => { rem = !rem; syncRem(); });
syncRem();

$('passToggle').addEventListener('click', () => {
    const inp = $('loginPassword');
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    $('passIcon').className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
});

async function hideSplash(fast) {
    const bar  = $('spBar');
    const hint = $('spHint');
    if (fast) {
        bar.style.width  = '100%';
        hint.textContent = 'أهلاً بعودتك';
        await sleep(480);
    } else {
        for (const s of [{w:'20%',t:'جاري التهيئة...'},{w:'60%',t:'تحميل البيانات...'},{w:'90%',t:'جاهز للانطلاق'}]) {
            bar.style.width  = s.w;
            hint.textContent = s.t;
            await sleep(380);
        }
        bar.style.width = '100%';
        await sleep(260);
    }
    $('splash').classList.add('out');
    await sleep(420);
    $('splash').style.display = 'none';
}

async function doLogin() {
    const email = $('loginEmail').value.trim().toLowerCase();
    const pass  = $('loginPassword').value;
    const btn   = $('loginBtn');

    clearAlert();

    if (!email || !pass) {
        showAlert('يرجى إدخال البريد الإلكتروني وكلمة المرور.', 'danger'); return;
    }

    btn.disabled = true;
    btn.innerHTML = 'جاري التحقق <span class="spin"></span>';
    showAlert('جاري التحقق من بياناتك...', 'info');

    try {
        await setPersistence(auth, rem ? browserLocalPersistence : browserSessionPersistence);
        await signInWithEmailAndPassword(auth, email, pass);

        if (rem) localStorage.setItem('s2_rem', '1');
        else     localStorage.removeItem('s2_rem');

        showAlert('تم التحقق بنجاح — جاري التحويل...', 'success');
        await sleep(800);
        window.location.href = 'home.html';

    } catch (err) {
        showAlert(translateError(err.code), 'danger');
        btn.disabled = false;
        btn.textContent = 'تسجيل الدخول';
    }
}

['loginEmail', 'loginPassword'].forEach(id =>
    $(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); })
);
$('loginBtn').addEventListener('click', doLogin);

$('forgotLink').addEventListener('click', e => {
    e.preventDefault();
    clearAlert('resetAlert');
    $('resetEmail').value = $('loginEmail').value;
    $('resetModal').classList.add('show');
});
$('cancelReset').addEventListener('click', () => $('resetModal').classList.remove('show'));
$('resetModal').addEventListener('click', e => {
    if (e.target === $('resetModal')) $('resetModal').classList.remove('show');
});

$('sendReset').addEventListener('click', async () => {
    const email = $('resetEmail').value.trim().toLowerCase();
    const btn   = $('sendReset');
    clearAlert('resetAlert');

    if (!email) { showAlert('يرجى إدخال البريد الإلكتروني.', 'danger', 'resetAlert'); return; }

    btn.disabled = true;
    btn.textContent = 'جاري الإرسال...';

    try {
        await sendPasswordResetEmail(auth, email);
        showAlert('تم! تحقق من بريدك الإلكتروني.', 'success', 'resetAlert');
        btn.textContent = 'تم الإرسال ✓';
        await sleep(2500);
        $('resetModal').classList.remove('show');
    } catch (err) {
        showAlert(translateError(err.code), 'danger', 'resetAlert');
        btn.disabled = false;
        btn.textContent = 'إرسال الرابط';
    }
});

window.addEventListener('load', () => {
    onAuthStateChanged(auth, async user => {
        if (user) {
            await hideSplash(true);
            window.location.href = 'home.html';
        } else {
            await hideSplash(false);
            $('auth').classList.add('show');
        }
    });
});
</script>
</body>
</html>

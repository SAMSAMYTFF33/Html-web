<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار حفظ بيانات المستخدم سحابياً</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #1e1e1e; 
            color: #ffffff; 
            text-align: center; 
            padding: 40px 20px; 
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: #2d2d2d;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h2 { margin-bottom: 25px; color: #ff9900; }
        input { 
            display: block; 
            margin: 15px auto; 
            padding: 12px; 
            width: 100%; 
            box-sizing: border-box;
            border-radius: 6px; 
            border: 1px solid #444; 
            background: #3a3a3a;
            color: #fff;
            font-size: 16px;
        }
        button { 
            width: 100%;
            padding: 12px; 
            background: #ff9900; 
            border: none; 
            color: white; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px;
            font-weight: bold; 
            margin-top: 10px;
        }
        button:hover { background: #e08800; }
        #status { 
            margin-top: 20px; 
            font-size: 15px;
            font-weight: bold;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>واجهة تجربة الحفظ السحابي</h2>
        
        <input type="email" id="email" value="mohammed@gmail.com" placeholder="البريد الإلكتروني">
        <input type="text" id="password" value="mohammedyyyyyyy" placeholder="كلمة المرور">
        
        <button id="saveBtn">إرسال البيانات إلى Firebase</button>

        <p id="status"></p>
    </div>

    <script type="module">
        // استيراد مكتبة التهيئة الأساسية ومكتبة قاعدة البيانات Firestore
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // بيانات مشروعك الخاصة التي أرسلتها لي
        const firebaseConfig = {
          apiKey: "AIzaSyAhRvNdTyX_S29wfjBdxQ1QR98XmNB_6WQ",
          authDomain: "wep-app-1771a.firebaseapp.com",
          projectId: "wep-app-1771a",
          storageBucket: "wep-app-1771a.firebasestorage.app",
          messagingSenderId: "568445406110",
          appId: "1:568445406110:web:b2225d5747779e70a2248f",
          measurementId: "G-0NPTXF3RF9"
        };

        // تفعيل الـ Firebase والاتصال بـ قاعدة البيانات بدون جداول
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // مراقبة الضغط على زر الإرسال لتنفيذ عملية الحفظ تلقائياً
        document.getElementById('saveBtn').addEventListener('click', async () => {
            const emailValue = document.getElementById('email').value;
            const passwordValue = document.getElementById('password').value;
            const statusText = document.getElementById('status');

            // تغيير النص لإعلام المستخدم ببدء الاتصال
            statusText.style.color = "#ffcc00";
            statusText.innerText = "جاري إرسال البيانات وحفظها سحابياً...";

            try {
                // سيقوم السيرفر هنا بإنشاء مجلد (Collection) باسم users تلقائياً
                // ويحفظ بداخله مستند جديد يحتوي على الكود بالأسفل
                const docRef = await addDoc(collection(db, "users"), {
                    username: emailValue,
                    password: passwordValue,
                    savedAt: new Date() // توقيت الحفظ التلقائي
                });

                // في حال النجاح
                statusText.style.color = "#00ff66";
                statusText.innerHTML = `✅ تم الاتصال والحفظ بنجاح!<br><span style="font-size:12px; color:#aaa;">رقم تعريف المستند السحابي: ${docRef.id}</span>`;
            } catch (error) {
                // في حال حدوث خطأ (مثل عدم الاتصال بالإنترنت)
                statusText.style.color = "#ff3333";
                statusText.innerText = `❌ خطأ في الاتصال بالسيرفر: ${error.message}`;
                console.error(error);
            }
        });
    </script>
</body>
</html>

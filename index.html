<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آلة حاسبة احترافية</title>
    <style>
        /* إعادة تعيين الأنماط الأساسية */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* خلفية الصفحة */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
        }

        /* حاوية الآلة الحاسبة */
        .calculator {
            background-color: #1e2530;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 340px;
        }

        /* شاشة العرض */
        .display {
            background-color: #0f141c;
            color: #ffffff;
            padding: 20px;
            border-radius: 15px;
            text-align: left; /* لجعل الأرقام تبدأ من اليسار كالمعتاد */
            font-size: 2.5rem;
            margin-bottom: 20px;
            min-height: 80px;
            word-wrap: break-word;
            word-break: break-all;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            direction: ltr; /* اتجاه الكتابة الرياضية من اليسار لليمين */
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.5);
        }

        /* شبكة الأزرار */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        /* الأزرار بشكل عام */
        button {
            padding: 18px;
            font-size: 1.3rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #ffffff;
            background-color: #2d3748;
        }

        /* تأثير عند تمرير الماوس وضغط الأزرار */
        button:hover {
            background-color: #4a5568;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(1px);
        }

        /* أزرار العمليات الحسابية */
        .operator {
            background-color: #f59e0b;
            color: #ffffff;
        }
        .operator:hover {
            background-color: #d97706;
        }

        /* زر المسح الشامل وزر الحذف */
        .clear {
            background-color: #ef4444;
        }
        .clear:hover {
            background-color: #dc2626;
        }

        /* زر اليساوي */
        .equal {
            background-color: #10b981;
            grid-column: span 2; /* يأخذ مساحتين */
        }
        .equal:hover {
            background-color: #059669;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="display" id="display">0</div>

        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="clear" onclick="deleteLast()">DEL</button>
            <button class="operator" onclick="appendValue('%')">%</button>
            <button class="operator" onclick="appendValue('/')">÷</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('*')">×</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('-')">-</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="operator" onclick="appendValue('+')">+</button>

            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        let shouldResetDisplay = false;

        // إضافة الأرقام أو العمليات للشاشة
        function appendValue(value) {
            if (display.innerText === '0' && !isNaN(value) || shouldResetDisplay) {
                resetDisplay();
            }
            
            // منع تكرار النقطة العشرية في نفس الرقم
            if (value === '.' && display.innerText.includes('.')) {
                // فحص بسيط للتأكد من عدم وجود نقطة في الجزء الحالي من العملية
                const parts = display.innerText.split(/[\+\-\*\/]/);
                if (parts[parts.length - 1].includes('.')) return;
            }

            if (display.innerText === '0' && isNaN(value) && value !== '.') {
                return; // منع بدء العملية برموز معينة
            }

            display.innerText += value;
        }

        // مسح الشاشة بالكامل
        function clearDisplay() {
            display.innerText = '0';
            shouldResetDisplay = false;
        }

        // تفريغ الشاشة مؤقتاً عند بدء إدخال جديد بعد عملية حسابية
        function resetDisplay() {
            display.innerText = '';
            shouldResetDisplay = false;
        }

        // حذف آخر عنصر (زر DEL)
        function deleteLast() {
            if (display.innerText.length > 1) {
                display.innerText = display.innerText.slice(0, -1);
            } else {
                display.innerText = '0';
            }
        }

        // حساب الناتج النهائي
        function calculate() {
            try {
                // التحقق من عدم وجود عملية حسابية فارغة أو منتهية برموز
                let expression = display.innerText;
                
                if (!expression || isNaN(expression.slice(-1)) && expression.slice(-1) !== '%') {
                    return; 
                }

                // حساب النسبة المئوية برمجياً قبل التقييم
                expression = expression.replace(/%/g, '/100');

                // تنفيذ العملية الحسابية بأمان
                let result = eval(expression);

                // التعامل مع معضلة القسمة على صفر
                if (result === Infinity || result === -Infinity) {
                    display.innerText = 'خطأ: قسمة على 0';
                    shouldResetDisplay = true;
                    return;
                }

                // تقريب الأرقام العشرية الطويلة لعدم تشويه المظهر (مثلاً 0.1 + 0.2)
                display.innerText = Number(result.toFixed(8)).toString();
                shouldResetDisplay = true;

            } catch (error) {
                display.innerText = 'خطأ';
                shouldResetDisplay = true;
            }
        }
    </script>
</body>
</html>
